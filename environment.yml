name: pump
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pandas
  - numpy
  - scikit-learn
  - "mkl<2024"
  - xgboost
  - lightgbm
  - shap
  - matplotlib
  - seaborn
  - plotly
  - folium
  - joblib
  - optuna
  - pydantic
  - python-dotenv
  - typer
  - pytest
  - pytest-cov
  - mypy
  - ruff
  - pip
  - pip:
    - -e .
